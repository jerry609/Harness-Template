name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate harness artifacts
        run: python scripts/validate_artifacts.py

      - name: Check module boundaries
        run: python scripts/check_boundaries.py

      - name: Run agent-friendly linter
        run: python scripts/lint_agent_friendly.py